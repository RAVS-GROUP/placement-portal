<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Candidate Registration | Udayan Care
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/register.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<section class="registration-section">

<div class="container">

<div class="registration-card">

<!-- HEADER -->

<div class="text-center mb-4">

<h2>

Career Development & Placement Portal

</h2>

<p>

Candidate Registration Form

</p>

</div>

<!-- Progress -->

<div class="progress mb-4" style="height:12px;">

<div
class="progress-bar bg-primary"
id="progressBar"
style="width:16%;">

</div>

</div>

<!-- Steps -->

<div class="step-indicator">

<div class="step active">

<span>1</span>

<p>Personal</p>

</div>

<div class="step">

<span>2</span>

<p>Education</p>

</div>

<div class="step">

<span>3</span>

<p>Experience</p>

</div>

<div class="step">

<span>4</span>

<p>Skills</p>

</div>

<div class="step">

<span>5</span>

<p>Preference</p>

</div>

<div class="step">

<span>6</span>

<p>Documents</p>

</div>

</div>

<form id="candidateForm">

<!-- STEP 1 -->

<div class="form-step active">

<h4 class="mb-4">

Personal Details

</h4>

<div class="step-content">

<!-- Fields next module -->

</div>

</div>

<!-- STEP 2 -->

<div class="form-step">

<h4 class="mb-4">

Education

</h4>

<div class="step-content"></div>

</div>

<!-- STEP 3 -->

<div class="form-step">

<h4 class="mb-4">

Experience

</h4>

<div class="step-content"></div>

</div>

<!-- STEP 4 -->

<div class="form-step">

<h4 class="mb-4">

Skills

</h4>

<div class="step-content"></div>

</div>

<!-- STEP 5 -->

<div class="form-step">

<h4 class="mb-4">

Job Preference

</h4>

<div class="step-content"></div>

</div>

<!-- STEP 6 -->

<div class="form-step">

<h4 class="mb-4">

Documents

</h4>

<div class="step-content"></div>

</div>

<div class="button-area">

<button
type="button"
class="btn btn-secondary"
id="prevBtn">

Previous

</button>

<button
type="button"
class="btn btn-primary"
id="nextBtn">

Next

</button>

</div>

</form>

</div>

</div>

</section>

<script src="../js/register.js"></script>

</body>

</html>
