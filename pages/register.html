<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Candidate Registration | Udayan Care
</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="../css/register.css">

</head>


<body>


<div class="container py-5">


<div class="registration-box">


<div class="text-center mb-4">

<h2>
Udayan Care Career Portal
</h2>

<p>
Candidate Registration Form
</p>

</div>



<form id="candidateForm">


<div class="row">


<div class="col-md-6 mb-3">

<label>
Full Name *
</label>

<input 
type="text"
id="full_name"
class="form-control"
required>

</div>



<div class="col-md-6 mb-3">

<label>
Mobile Number *
</label>

<input 
type="tel"
id="mobile"
class="form-control"
required>

</div>



<div class="col-md-6 mb-3">

<label>
Email
</label>

<input 
type="email"
id="email"
class="form-control">

</div>



<div class="col-md-6 mb-3">

<label>
Gender
</label>

<select id="gender" class="form-select">

<option value="">
Select
</option>

<option>
Male
</option>

<option>
Female
</option>

<option>
Other
</option>

</select>

</div>



<div class="col-md-6 mb-3">

<label>
Date of Birth
</label>

<input
type="date"
id="dob"
class="form-control">

</div>



<div class="col-md-6 mb-3">

<label>
State
</label>

<input
type="text"
id="state"
class="form-control">

</div>



<div class="col-md-6 mb-3">

<label>
District
</label>

<input
type="text"
id="district"
class="form-control">

</div>



<div class="col-md-6 mb-3">

<label>
Pincode
</label>

<input
type="number"
id="pincode"
class="form-control">

</div>



<div class="col-md-12 mb-3">

<label>
Qualification
</label>

<input
type="text"
id="qualification"
class="form-control">

</div>



<div class="text-end mt-4">

<button 
type="submit"
class="btn btn-primary">

Submit Registration

</button>


</div>



</div>


</form>


<div id="message" class="mt-3 text-center"></div>


</div>


</div>



<script src="../js/register.js"></script>


</body>

</html>
