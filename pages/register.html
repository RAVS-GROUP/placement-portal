<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Candidate Registration

</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="../css/register.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="registration-box">

<div class="text-center">

<h2>

Career Development & Placement Portal

</h2>

<p>

Candidate Registration Form

</p>

</div>

<div class="progress">

<div class="progress-bar"

style="width:17%;">

Step 1 of 6

</div>

</div>

<form>

<div class="row">

<div class="col-md-6">

<label>

Full Name *

</label>

<input
type="text"
class="form-control">

</div>

<div class="col-md-6">

<label>

Mobile Number *

</label>

<input
type="tel"
class="form-control">

</div>

<div class="col-md-6">

<label>

Email

</label>

<input
type="email"
class="form-control">

</div>

<div class="col-md-6">

<label>

Gender

</label>

<select
class="form-select">

<option>

Select

</option>

<option>

Female

</option>

<option>

Male

</option>

<option>

Other

</option>

</select>

</div>

<div class="col-md-6">

<label>

Date of Birth

</label>

<input
type="date"
class="form-control">

</div>

<div class="col-md-6">

<label>

Current State

</label>

<input
type="text"
class="form-control">

</div>

<div class="col-md-6">

<label>

Current District

</label>

<input
type="text"
class="form-control">

</div>

<div class="col-md-6">

<label>

Pincode

</label>

<input
type="number"
class="form-control">

</div>

</div>

<div class="text-end mt-5">

<button
class="btn btn-primary">

Next →

</button>

</div>

</form>

</div>

</div>

</body>

</html>
