<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Candidate Registration | Udayan Care
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/register.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<section class="registration-section">

<div class="container">

<div class="registration-card">

<!-- HEADER -->

<div class="text-center mb-4">

<h2>

Career Development & Placement Portal

</h2>

<p>

Candidate Registration Form

</p>

</div>

<!-- Progress -->

<div class="progress mb-4" style="height:12px;">

<div
class="progress-bar bg-primary"
id="progressBar"
style="width:16%;">

</div>

</div>

<!-- Steps -->

<div class="step-indicator">

<div class="step active">

<span>1</span>

<p>Personal</p>

</div>

<div class="step">

<span>2</span>

<p>Education</p>

</div>

<div class="step">

<span>3</span>

<p>Experience</p>

</div>

<div class="step">

<span>4</span>

<p>Skills</p>

</div>

<div class="step">

<span>5</span>

<p>Preference</p>

</div>

<div class="step">

<span>6</span>

<p>Documents</p>

</div>

</div>

<form id="candidateForm">

<!-- STEP 1 -->

<!-- STEP 1 -->

<div class="form-step active">

<h4 class="mb-4">
Personal Details
</h4>

<div class="step-content">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Full Name <span class="text-danger">*</span>

</label>

<input
type="text"
class="form-control"
id="fullName"
placeholder="Enter Full Name">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Mobile Number <span class="text-danger">*</span>

</label>

<input
type="tel"
class="form-control"
id="mobile"
placeholder="10 Digit Mobile Number">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Alternate Mobile

</label>

<input
type="tel"
class="form-control"
id="alternateMobile"
placeholder="Alternate Mobile">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
class="form-control"
id="email"
placeholder="example@email.com">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Gender

</label>

<select
class="form-select"
id="gender">

<option value="">Select</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Date of Birth

</label>

<input
type="date"
class="form-control"
id="dob">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Aadhaar Number

</label>

<input
type="text"
class="form-control"
id="aadhaar"
placeholder="12 Digit Aadhaar">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Category

</label>

<select
class="form-select"
id="category">

<option value="">Select</option>

<option>General</option>

<option>OBC</option>

<option>SC</option>

<option>ST</option>

<option>EWS</option>

</select>

</div>

<div class="col-md-12 mb-3">

<label class="form-label">

Current Address

</label>

<textarea
class="form-control"
id="address"
placeholder="Enter Current Address"></textarea>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

State

</label>

<input
type="text"
class="form-control"
id="state"
placeholder="State">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

District

</label>

<input
type="text"
class="form-control"
id="district"
placeholder="District">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

Pincode

</label>

<input
type="number"
class="form-control"
id="pincode"
placeholder="Pincode">

</div>

</div>

</div>
  
<!-- STEP 2 -->

<div class="form-step">

<h4 class="mb-4">

Education

</h4>

<div class="step-content">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Highest Qualification
</label>

<select class="form-select" id="qualification">

<option value="">Select Qualification</option>
<option>10th</option>
<option>12th</option>
<option>ITI</option>
<option>Diploma</option>
<option>Graduate</option>
<option>Post Graduate</option>
<option>PhD</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Specialization
</label>

<input
type="text"
class="form-control"
id="specialization">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
College / Institute
</label>

<input
type="text"
class="form-control"
id="college">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
University / Board
</label>

<input
type="text"
class="form-control"
id="university">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Passing Year
</label>

<input
type="number"
class="form-control"
id="passingYear">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Percentage / CGPA
</label>

<input
type="text"
class="form-control"
id="percentage">

</div>

</div>

</div>

<!-- STEP 3 -->

<div class="form-step">

<h4 class="mb-4">

Experience

</h4>

<div class="step-content"></div>

</div>

<!-- STEP 4 -->

<div class="form-step">

<h4 class="mb-4">

Skills

</h4>

<div class="step-content"></div>

</div>

<!-- STEP 5 -->

<div class="form-step">

<h4 class="mb-4">

Job Preference

</h4>

<div class="step-content"></div>

</div>

<!-- STEP 6 -->

<div class="form-step">

<h4 class="mb-4">

Documents

</h4>

<div class="step-content"></div>

</div>

<div class="button-area">

<button
type="button"
class="btn btn-secondary"
id="prevBtn">

Previous

</button>

<button
type="button"
class="btn btn-primary"
id="nextBtn">

Next

</button>

</div>

</form>

</div>

</div>

</section>

<script src="../js/register.js"></script>

</body>

</html>
